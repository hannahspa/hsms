<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hannah Spa — Quản Trị Viên</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/hannah-admin.css">
<style>
  body { background: #ece4d4; }
  .stage-wrap { width: 100%; height: 100%; }
</style>
</head>
<body class="grain">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel" src="components/Icons.jsx"></script>
<script type="text/babel" src="components/DashHeader.jsx"></script>
<script type="text/babel" src="components/DashBody.jsx"></script>
<script type="text/babel" src="components/Mobile.jsx"></script>
<script type="text/babel" src="components/Pos.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="browser-window.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>

<script type="text/babel">
  const { Sidebar, Topbar, HeroStrip, KPIs } = window.HannahDashHeader;
  const { RevenueChart, RecentRevenue, Alerts, StaffToday, BookingsToday, TopServices } = window.HannahDashBody;
  const { MobileDash } = window.HannahMobile;
  const { PosScreen } = window.HannahPos;

  // ─── Desktop Dashboard scene ───
  function DesktopDash() {
    return (
      <div className="app grain" data-screen-label="Desktop · Dashboard">
        <Sidebar/>
        <main className="main">
          <Topbar/>
          <div className="page">
            <HeroStrip/>
            <KPIs/>
            <div className="grid-2">
              <RevenueChart/>
              <Alerts/>
            </div>
            <div className="grid-2">
              <RecentRevenue/>
              <StaffToday/>
            </div>
            <div className="grid-2">
              <BookingsToday/>
              <TopServices/>
            </div>
          </div>
        </main>
      </div>
    );
  }

  function DesktopPos() {
    return (
      <div className="app" data-screen-label="Desktop · POS">
        <Sidebar/>
        <main className="main">
          <Topbar/>
          <PosScreen/>
        </main>
      </div>
    );
  }

  // Browser frame helper
  function Browser({children, w=1440, h=900, url='admin.hannahspa.vn'}) {
    return (
      <ChromeWindow
        width={w} height={h}
        url={url}
        tabs={[
          {title:'Hannah Spa — Quản Trị', active:true},
          {title:'POS · Bán Hàng'},
          {title:'CRM Khách Hàng'},
        ]}
        activeIndex={0}
      >
        <div className="stage-wrap">{children}</div>
      </ChromeWindow>
    );
  }

  // iOS frame helper
  function Phone({children, label='iPhone'}) {
    return (
      <IOSDevice width={390} height={844} dark={false} title={label}>
        {children}
      </IOSDevice>
    );
  }

  function App() {
    return (
      <DesignCanvas
        title="Hannah Spa · Hệ Thống Quản Trị"
        subtitle="Ngôn ngữ thiết kế lấy từ kiến trúc spa — vòm cong, kem nồng, gỗ óc chó, ánh đồng. · Desktop + Mobile."
      >
        <DCSection
          id="desktop"
          title="Desktop — 1440 × 900"
          subtitle="Dashboard tổng hợp · POS bán hàng. Thiết kế cho màn hình quản trị tại quầy lễ tân Hannah Spa."
        >
          <DCArtboard id="dash" label="Dashboard · Tổng Quan Hôm Nay" width={1440} height={900}>
            <Browser><DesktopDash/></Browser>
          </DCArtboard>
          <DCArtboard id="pos" label="POS · Bán Hàng — Hoá Đơn #HN-2058" width={1440} height={900}>
            <Browser url="admin.hannahspa.vn/pos"><DesktopPos/></Browser>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="mobile"
          title="Mobile — iPhone 14 Pro"
          subtitle="Phiên bản di động cho chủ spa & quản lý ca trực — xem nhanh khi rời quầy."
        >
          <DCArtboard id="mdash" label="Mobile · Dashboard" width={390} height={844}>
            <Phone label="Hannah Admin"><MobileDash/></Phone>
          </DCArtboard>
        </DCSection>

      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
