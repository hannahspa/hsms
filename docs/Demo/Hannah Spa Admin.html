<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hannah Spa — Quản Trị Viên</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/hannah-admin.css">
<link rel="stylesheet" href="styles/modules.css">
<style>
  body { background: #ece4d4; }
  .stage-wrap { width: 100%; height: 100%; }
</style>
</head>
<body class="grain">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel" src="components/Icons.jsx"></script>
<script type="text/babel" src="components/DashHeader.jsx"></script>
<script type="text/babel" src="components/DashBody.jsx"></script>
<script type="text/babel" src="components/Mobile.jsx"></script>
<script type="text/babel" src="components/Pos.jsx"></script>
<script type="text/babel" src="components/Booking.jsx"></script>
<script type="text/babel" src="components/Finance.jsx"></script>
<script type="text/babel" src="components/StaffCRM.jsx"></script>
<script type="text/babel" src="components/InventoryPromo.jsx"></script>
<script type="text/babel" src="components/MarketingCMS.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="browser-window.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>

<script type="text/babel">
  const { Sidebar, Topbar, HeroStrip, KPIs } = window.HannahDashHeader;
  const { RevenueChart, RecentRevenue, Alerts, StaffToday, BookingsToday, TopServices } = window.HannahDashBody;
  const { MobileDash } = window.HannahMobile;
  const { PosScreen } = window.HannahPos;
  const { BookingScreen } = window.HannahBooking;
  const { FinanceScreen, ReconcileScreen } = window.HannahFinance;
  const { StaffScreen, CRMScreen } = window.HannahStaffCRM;
  const { InventoryScreen, PromoScreen } = window.HannahInventoryPromo;
  const { MarketingScreen, CMSScreen } = window.HannahMktCMS;

  // Topbar variant for inner pages — accepts title + path
  function TopbarPage({ title, path }) {
    return (
      <header className="topbar">
        <div className="crumbs">
          <div>
            <div className="h">{title}</div>
            <div className="path">{path}</div>
          </div>
        </div>
        <div className="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input placeholder="Tìm khách hàng, dịch vụ, hoá đơn…" />
          <kbd>⌘K</kbd>
        </div>
        <div className="top-actions">
          <button className="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={{width:17,height:17}}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/></svg></button>
          <button className="btn gold">+ Tạo Đơn</button>
          <div className="now-clock">
            <div className="t">14:32</div>
            <div className="d">T7 · 10/05/2026</div>
          </div>
        </div>
      </header>
    );
  }

  function Page({ children, label }) {
    return (
      <div className="app" data-screen-label={label}>
        <Sidebar/>
        <main className="main">{children}</main>
      </div>
    );
  }

  function Browser({children, url='admin.hannahspa.vn'}) {
    return (
      <ChromeWindow
        width={1440} height={900}
        url={url}
        tabs={[{title:'Hannah Spa — Quản Trị', active:true}]}
        activeIndex={0}
      >
        <div className="stage-wrap">{children}</div>
      </ChromeWindow>
    );
  }

  function Phone({children, label='iPhone'}) {
    return (
      <IOSDevice width={390} height={844} dark={false} title={label}>
        {children}
      </IOSDevice>
    );
  }

  function App() {
    return (
      <DesignCanvas
        title="Hannah Spa · Hệ Thống Quản Trị Hoàn Chỉnh"
        subtitle="9 module chính · Desktop 1440×900 · Mobile 390×844 · Ngôn ngữ thiết kế: vòm cong + kem ấm + espresso + champagne."
      >
        <DCSection
          id="overview"
          title="01 · Tổng Quan & Mobile"
          subtitle="Dashboard tổng hợp KPI ngày · phiên bản di động cho chủ spa xem nhanh."
        >
          <DCArtboard id="dash" label="Dashboard · Tổng Quan Hôm Nay" width={1440} height={900}>
            <Browser>
              <Page label="01 Dashboard">
                <Topbar/>
                <div className="page">
                  <HeroStrip/><KPIs/>
                  <div className="grid-2"><RevenueChart/><Alerts/></div>
                  <div className="grid-2"><RecentRevenue/><StaffToday/></div>
                  <div className="grid-2"><BookingsToday/><TopServices/></div>
                </div>
              </Page>
            </Browser>
          </DCArtboard>
          <DCArtboard id="mdash" label="Mobile · Dashboard" width={390} height={844}>
            <Phone label="Hannah Admin"><MobileDash/></Phone>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="ops"
          title="02 · Vận Hành"
          subtitle="POS bán hàng tại quầy · Lịch hẹn tuần với KTV/phòng · Đối soát ca tiền mặt + ngân hàng."
        >
          <DCArtboard id="pos" label="POS · Bán Hàng Tại Quầy" width={1440} height={900}>
            <Browser url="admin.hannahspa.vn/pos">
              <Page label="02 POS"><Topbar/><PosScreen/></Page>
            </Browser>
          </DCArtboard>
          <DCArtboard id="book" label="Đặt Hẹn · Lịch Tuần + Chi Tiết" width={1440} height={900}>
            <Browser url="admin.hannahspa.vn/booking">
              <Page label="03 Đặt Hẹn">
                <TopbarPage title="Đặt Hẹn" path="Vận Hành · Lịch hẹn tuần 19"/>
                <BookingScreen/>
              </Page>
            </Browser>
          </DCArtboard>
          <DCArtboard id="rec" label="Đối Soát Ngày · Két + Ngân Hàng + Ví" width={1440} height={900}>
            <Browser url="admin.hannahspa.vn/reconcile">
              <Page label="04 Đối Soát">
                <TopbarPage title="Đối Soát" path="Vận Hành · Cuối ca chiều 10/05"/>
                <ReconcileScreen/>
              </Page>
            </Browser>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="money"
          title="03 · Tài Chính"
          subtitle="Thu chi tổng quan tháng · 3 ví song hành · sổ quỹ tích hợp."
        >
          <DCArtboard id="fin" label="Thu Chi & Báo Cáo Tháng" width={1440} height={900}>
            <Browser url="admin.hannahspa.vn/finance">
              <Page label="05 Thu Chi">
                <TopbarPage title="Thu Chi & Báo Cáo" path="Tài chính · Tháng 5 / 2026"/>
                <FinanceScreen/>
              </Page>
            </Browser>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="people"
          title="04 · Con Người"
          subtitle="Hồ sơ nhân sự + lịch ca + hoa hồng · CRM khách hàng phân khúc theo LTV/seg."
        >
          <DCArtboard id="staff" label="Nhân Sự · Hồ Sơ + Lịch Ca" width={1440} height={900}>
            <Browser url="admin.hannahspa.vn/staff">
              <Page label="06 Nhân Sự">
                <TopbarPage title="Nhân Sự" path="Quản lý · Đội ngũ 6 người"/>
                <StaffScreen/>
              </Page>
            </Browser>
          </DCArtboard>
          <DCArtboard id="crm" label="CRM · Phân Khúc Khách Hàng" width={1440} height={900}>
            <Browser url="admin.hannahspa.vn/crm">
              <Page label="07 CRM">
                <TopbarPage title="CRM Khách Hàng" path="Quản lý · 1.284 hồ sơ"/>
                <CRMScreen/>
              </Page>
            </Browser>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="goods"
          title="05 · Hàng Hoá & Khuyến Mãi"
          subtitle="Kho 2 loại — sản phẩm bán & vật tư phòng. Khuyến mãi có quy tắc tự động hoá."
        >
          <DCArtboard id="inv" label="Kho Hàng · SKU + Tồn Kho + Cảnh Báo" width={1440} height={900}>
            <Browser url="admin.hannahspa.vn/inventory">
              <Page label="08 Kho">
                <TopbarPage title="Kho Hàng" path="Quản lý · 218 SKU"/>
                <InventoryScreen/>
              </Page>
            </Browser>
          </DCArtboard>
          <DCArtboard id="promo" label="Khuyến Mãi · Chương Trình + Quy Tắc" width={1440} height={900}>
            <Browser url="admin.hannahspa.vn/promotions">
              <Page label="09 KM">
                <TopbarPage title="Khuyến Mãi" path="Quản lý · 6 chương trình"/>
                <PromoScreen/>
              </Page>
            </Browser>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="grow"
          title="06 · Tăng Trưởng"
          subtitle="Marketing đa kênh có phễu chuyển đổi · Biên tập nội dung website hannahspa.vn."
        >
          <DCArtboard id="mkt" label="Marketing · Chiến Dịch Đa Kênh" width={1440} height={900}>
            <Browser url="admin.hannahspa.vn/marketing">
              <Page label="10 Marketing">
                <TopbarPage title="Marketing" path="Tăng trưởng · 6 chiến dịch active"/>
                <MarketingScreen/>
              </Page>
            </Browser>
          </DCArtboard>
          <DCArtboard id="cms" label="Nội Dung Web · CMS Trang Hannahspa.vn" width={1440} height={900}>
            <Browser url="admin.hannahspa.vn/cms">
              <Page label="11 CMS">
                <TopbarPage title="Nội Dung Web" path="Tăng trưởng · hannahspa.vn"/>
                <CMSScreen/>
              </Page>
            </Browser>
          </DCArtboard>
        </DCSection>

      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
